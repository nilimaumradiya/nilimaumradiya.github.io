<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navy Gradient with Image Tag</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .hero1 {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 40px;
    box-sizing: border-box;
    color: white;
  }

  .hero1 img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* navy gradient overlay */
  .hero1::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;

    background: linear-gradient(to right,
      rgba(10, 25, 90, 0.0),  /* left transparent */
      rgba(10, 25, 90, 0.6),
      rgba(5, 13, 45, 0.95) /* right solid navy */
    );
  }

  .content {
    position: relative;
    z-index: 3; /* above image + gradient */
    max-width: 380px;
    text-align: right;
  }

  .content h1 {
    margin: 0 0 10px;
    font-size: 35px;
    font-weight: 700;
  }

  .content p {
    line-height: 1.5;
    opacity: 0.9;
  }
</style>
</head>

<body>

<div class="hero">
  <img src="Nilima.jpeg" alt="background image">

  <div class="content">
    <h1>Your Heading</h1>
    <p>Your text appears on the right side over the navy gradient.</p>
  </div>
</div>

</body>
</html>
